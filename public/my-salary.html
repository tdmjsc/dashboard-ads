<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lương của tôi — TDMJSC</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0B1322">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TDM Ads">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0B1322;color:#E7EEF8;}
  header{background:#10192B;border-bottom:1px solid rgba(255,255,255,.07);padding:14px 18px;}
  .top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  h1{font-size:17px;margin:0;}
  .sub{color:#9FB0C8;font-size:12px;margin:2px 0 0;font-weight:400;}
  select.pick{font-family:'Inter';font-size:13px;color:#fff;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);padding:9px 12px;border-radius:9px;outline:none;cursor:pointer;color-scheme:dark;}
  .link{color:#C4D0E2;font-size:13px;text-decoration:none;border:1px solid rgba(255,255,255,.14);padding:7px 12px;border-radius:9px;white-space:nowrap;}
  .link:hover{background:rgba(255,255,255,.08);color:#fff;}
  .user-badge{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#9DB2FF;background:rgba(157,178,255,.1);border:1px solid rgba(157,178,255,.2);padding:7px 12px;border-radius:9px;font-weight:600;white-space:nowrap;}
  main{padding:18px;max-width:1100px;margin:0 auto;}
  .status{font-size:13px;color:#9FB0C8;margin:4px 0 16px;min-height:18px;}
  .status .err{color:#ff9b8a;} .status .ok{color:#7BE3B5;}
  .wrap{overflow-x:auto;border-radius:12px;}
  table{width:100%;border-collapse:collapse;background:#101B2E;border-radius:12px;overflow:hidden;min-width:760px;}
  th,td{padding:12px 14px;text-align:left;font-size:13.5px;border-bottom:1px solid rgba(255,255,255,.05);white-space:nowrap;}
  th{background:#16233A;color:#9FB0C8;font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;}
  .auto{display:block;font-size:11px;color:#6B7C97;margin-top:2px;}
  .l2{color:#7BE3B5;font-weight:700;}
  .hh{color:#C4A8FF;font-weight:600;}
  .thuc{color:#ffc56b;font-weight:800;}
  .neg{color:#ff9b8a;}
  .exp{cursor:pointer;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#9FB0C8;width:24px;height:24px;border-radius:6px;font-size:14px;margin-right:8px;}
  .exp:hover{background:rgba(61,90,254,.2);color:#fff;}
  .detail td{background:#0D1626;font-size:12.5px;}
  .chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;margin-left:6px;}
  .chip-moi{background:rgba(123,227,181,.12);color:#7BE3B5;}
  .chip-cu{background:rgba(255,197,107,.12);color:#ffc56b;}
  .muted{color:#6B7C97;}
  .empty{padding:40px;text-align:center;color:#6B7C97;}
  .ch-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
  .ch-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:6px 10px;font-size:12px;}
  .ch-item b{color:#9DB2FF;}
</style>
</head>
<body>
<header>
  <div class="top">
    <div style="flex:1;min-width:160px;">
      <h1>💰 Lương của tôi</h1>
      <p class="sub" id="sub">Bảng lương đã được công khai</p>
    </div>
    <select class="pick" id="monthPick"><option>Đang tải…</option></select>
    <a href="/" class="link" id="backLink">← Trang chính</a>
    <span class="user-badge" id="userBadge"></span>
    <a href="/logout" class="link">Đăng xuất</a>
  </div>
</header>

<main>
  <div class="status" id="status"></div>
  <div class="wrap"><div id="content"></div></div>
</main>

<script>
const $=id=>document.getElementById(id);
const vnd=n=>(Math.round(Number(n)||0)).toLocaleString('vi-VN');
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let MONTHS=[], CUR=null, expanded={};
const CH_LABEL={thailan:'Thái Lan',pushsale:'Pushsale',shopee:'Shopee',san:'Sàn TMĐT'};

async function loadMonths(){
  try{
    const r=await fetch('/api/my-salary/months');
    if(r.status===401){location.href='/login';return;}
    const d=await r.json();
    MONTHS=d.months||[];
    if(!MONTHS.length){
      $('monthPick').innerHTML='<option>Chưa có</option>';
      $('content').innerHTML='<div class="empty">Chưa có bảng lương nào được công khai cho bạn.</div>';
      return;
    }
    $('monthPick').innerHTML=MONTHS.map(m=>{
      const label=(m.type==='ptsp'?'PTSP ':'Marketing ')+'Tháng '+m.month;
      return `<option value="${esc(m.key)}">${label}</option>`;
    }).join('');
    loadDetail(MONTHS[0].key);
  }catch(e){ $('status').innerHTML='<span class="err">Lỗi tải dữ liệu</span>'; }
}

async function loadDetail(key){
  expanded={};
  $('content').innerHTML='<div class="empty">Đang tải…</div>';
  try{
    const r=await fetch('/api/my-salary/detail?key='+encodeURIComponent(key));
    const d=await r.json();
    if(!d.ok){ $('content').innerHTML='<div class="empty">'+esc(d.message||'Không có dữ liệu')+'</div>'; return; }
    CUR=d;
    render();
    $('status').innerHTML='<span class="ok">✓ Bảng lương tháng '+esc(d.month)+(d.type==='ptsp'?' · Phát triển SP':' · Marketing')+'</span>';
  }catch(e){ $('content').innerHTML='<div class="empty">Lỗi tải dữ liệu</div>'; }
}

function render(){
  if(!CUR||!CUR.rows||!CUR.rows.length){ $('content').innerHTML='<div class="empty">Không có dữ liệu của bạn trong tháng này.</div>'; return; }
  if(CUR.type==='ptsp') renderPtsp(); else renderMkt();
}

function renderMkt(){
  let h='<table><thead><tr><th>Nhân viên</th><th class="num">Doanh thu</th><th class="num">Chi phí QC</th><th class="num">Giá vốn</th><th class="num">Phí ship</th><th class="num">Lương 2%</th><th class="num">HH Leader</th><th class="num">Lương cứng</th><th class="num">Thưởng</th><th class="num">Phạt</th><th class="num">BHXH</th><th class="num">Thực nhận</th></tr></thead><tbody>';
  CUR.rows.forEach((row,idx)=>{
    const e=row.extra||{};
    const thuc=(row.luong||0)+(e.hoaHongLeader||0)+(e.luongCung||0)+(e.thuong||0)-(e.phat||0)-(e.bhxh||0);
    const hasCh=row.channels&&Object.values(row.channels).some(cd=>cd.dt||cd.qc||cd.gv||cd.ship);
    const isOpen=expanded[idx];
    h+=`<tr>
      <td>${hasCh?`<button class="exp" onclick="tg(${idx})">${isOpen?'−':'+'}</button>`:''}<b>${esc(row.name)}</b></td>
      <td class="num">${vnd(row.doanhthu)}${row.autoDT!=null?`<span class="auto">TĐ ${vnd(row.autoDT)}</span>`:''}</td>
      <td class="num">${vnd(row.chiPhiQC)}${row.autoQC!=null?`<span class="auto">TĐ ${vnd(row.autoQC)}</span>`:''}</td>
      <td class="num">${vnd(row.giaVon)}${row.autoGV!=null?`<span class="auto">TĐ ${vnd(row.autoGV)}</span>`:''}</td>
      <td class="num">${vnd(row.phiShip)}${row.autoSHIP!=null?`<span class="auto">TĐ ${vnd(row.autoSHIP)}</span>`:''}</td>
      <td class="num l2">${vnd(row.luong)}</td>
      <td class="num hh">${e.hoaHongLeader?vnd(e.hoaHongLeader):'–'}</td>
      <td class="num">${e.luongCung?vnd(e.luongCung):'–'}</td>
      <td class="num">${e.thuong?vnd(e.thuong):'–'}</td>
      <td class="num neg">${e.phat?'-'+vnd(e.phat):'–'}</td>
      <td class="num neg">${e.bhxh?'-'+vnd(e.bhxh):'–'}</td>
      <td class="num thuc">${vnd(thuc)} ₫</td>
    </tr>`;
    if(isOpen&&hasCh){
      let cells='<div class="ch-grid">';
      Object.entries(row.channels).forEach(([cid,cd])=>{
        if(cd.dt||cd.qc||cd.gv||cd.ship)
          cells+=`<div class="ch-item"><b>${CH_LABEL[cid]||cid}</b> · DT ${vnd(cd.dt)} · QC ${vnd(cd.qc)} · GV ${vnd(cd.gv)} · Ship ${vnd(cd.ship)}</div>`;
      });
      cells+='</div>';
      let tb='';
      if(e.thuongDTT) tb+=`Thưởng DTT: ${vnd(e.thuongDTT)} · `;
      if(e.thuongTop1) tb+=`Thưởng Top 1: ${vnd(e.thuongTop1)} · `;
      if(e.thuongNgayTuan) tb+=`Thưởng Ngày/Tuần: ${vnd(e.thuongNgayTuan)}`;
      h+=`<tr class="detail"><td colspan="12"><div class="muted" style="font-size:11px;margin-bottom:6px;">Doanh thu các kênh khác (đã cộng vào tổng):</div>${cells}${tb?`<div class="muted" style="font-size:12px;margin-top:8px;">${tb}</div>`:''}</td></tr>`;
    }
  });
  h+='</tbody></table>';
  $('content').innerHTML=h;
}

function renderPtsp(){
  let h='<table><thead><tr><th>Người quản lý</th><th class="num">Số SP</th><th class="num">SP mới</th><th class="num">SP cũ</th><th class="num">Đơn ship</th><th class="num">SL ship</th><th class="num">Doanh thu</th><th class="num">Giá vốn</th><th class="num">Phí ship</th><th class="num">Hoa hồng</th><th class="num">Lương cứng</th><th class="num">Thưởng</th><th class="num">Phạt</th><th class="num">BHXH</th><th class="num">Thực nhận</th></tr></thead><tbody>';
  CUR.rows.forEach((m,idx)=>{
    const thuc=(m.hoaHong||0)+(m.luongCung||0)+(m.thuong||0)-(m.phat||0)-(m.bhxh||0);
    const isOpen=expanded[idx];
    h+=`<tr>
      <td><button class="exp" onclick="tg(${idx})">${isOpen?'−':'+'}</button><b>${esc(m.manager)}</b></td>
      <td class="num">${vnd(m.soSP)}</td>
      <td class="num" style="color:#7BE3B5">${vnd(m.soSPmoi)}</td>
      <td class="num" style="color:#ffc56b">${vnd(m.soSPcu)}</td>
      <td class="num">${vnd(m.soDon)}</td>
      <td class="num">${vnd(m.soLuongSP)}</td>
      <td class="num">${vnd(m.doanhThuTong!=null?m.doanhThuTong:m.doanhThu)}</td>
      <td class="num muted">${vnd(m.giaVonTong!=null?m.giaVonTong:m.giaVon)}</td>
      <td class="num muted">${vnd(m.phiShipTong!=null?m.phiShipTong:m.phiShip)}</td>
      <td class="num l2">${vnd(m.hoaHong)} ₫</td>
      <td class="num">${m.luongCung?vnd(m.luongCung):'–'}</td>
      <td class="num">${m.thuong?vnd(m.thuong):'–'}</td>
      <td class="num neg">${m.phat?'-'+vnd(m.phat):'–'}</td>
      <td class="num neg">${m.bhxh?'-'+vnd(m.bhxh):'–'}</td>
      <td class="num thuc">${vnd(thuc)} ₫</td>
    </tr>`;
    if(isOpen){
      let inner='';
      const hasCh=m.channels&&Object.values(m.channels).some(cd=>cd.dt||cd.gv);
      if(hasCh){
        inner+='<div class="muted" style="font-size:11px;margin-bottom:6px;">Doanh thu kênh khác (hoa hồng 0.7%):</div><div class="ch-grid">';
        Object.entries(m.channels).forEach(([cid,cd])=>{
          if(cd.dt||cd.gv||cd.ship) inner+=`<div class="ch-item"><b>${CH_LABEL[cid]||cid}</b> · DT ${vnd(cd.dt)} · GV ${vnd(cd.gv)} · Ship ${vnd(cd.ship)}</div>`;
        });
        inner+='</div>';
        if(m.hoaHongKhac) inner+=`<div style="font-size:12px;color:#7BE3B5;margin-top:6px;">Hoa hồng kênh khác: ${vnd(m.hoaHongKhac)} ₫</div>`;
      }
      if(m.products&&m.products.length){
        inner+='<div class="muted" style="font-size:11px;margin:12px 0 6px;">Chi tiết sản phẩm:</div>';
        inner+='<table style="min-width:0;background:transparent;"><tbody>';
        m.products.sort((a,b)=>b.hoaHong-a.hoaHong).forEach(p=>{
          const chip=p.loai==='moi'?'<span class="chip chip-moi">mới 1%</span>':p.loai==='cu'?'<span class="chip chip-cu">cũ 0.7%</span>':'';
          inner+=`<tr><td style="border:none;padding:4px 8px;">${esc(p.product)}${chip}<span class="muted" style="font-size:11px;"> · ${p.ngayDang||'(trống)'} · SL ${vnd(p.soLuongSP)}</span></td>
            <td class="num" style="border:none;padding:4px 8px;">DT ${vnd(p.doanhThu)}</td>
            <td class="num muted" style="border:none;padding:4px 8px;">GV ${vnd(p.giaVon)}</td>
            <td class="num l2" style="border:none;padding:4px 8px;">${p.hoaHong>0?vnd(p.hoaHong)+' ₫':'–'}</td></tr>`;
        });
        inner+='</tbody></table>';
      }
      h+=`<tr class="detail"><td colspan="15">${inner||'<span class="muted">Không có chi tiết</span>'}</td></tr>`;
    }
  });
  h+='</tbody></table>';
  $('content').innerHTML=h;
}

function tg(idx){ expanded[idx]=!expanded[idx]; render(); }

$('monthPick').addEventListener('change',e=>loadDetail(e.target.value));

fetch('/api/me').then(r=>r.ok?r.json():null).then(me=>{
  if(!me) return;
  const back=$('backLink');
  if(me.role==='product'){ back.href='/products.html'; back.textContent='← Sản phẩm'; }
  else if(me.role==='viewer'){ back.href='/'; back.textContent='← Dashboard'; }
  else if(me.role==='staff'){ back.style.display='none'; }
  if(me.displayName){ const b=$('userBadge'); if(b) b.textContent='👤 '+me.displayName; }
}).catch(()=>{});

loadMonths();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
