<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảng lương — Check ADS TDMJSC</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0B1322">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TDM Ads">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0B1322;color:#E7EEF8;}
  header{background:#10192B;border-bottom:1px solid rgba(255,255,255,.07);padding:14px 18px;}
  .top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  h1{font-size:17px;margin:0;}
  .sub{color:#9FB0C8;font-size:12px;margin:2px 0 0;font-weight:400;}
  .ctrl{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);padding:7px 11px;border-radius:9px;}
  .ctrl label{font-size:11px;color:#9FB0C8;}
  .ctrl input{font-family:'Inter';font-size:13px;color:#fff;background:transparent;border:none;outline:none;color-scheme:dark;}
  .btn{font-family:'Inter';font-size:13px;font-weight:600;color:#fff;background:#3D5AFE;border:none;padding:8px 16px;border-radius:9px;cursor:pointer;white-space:nowrap;}
  .btn:hover{background:#2f49d6;} .btn:disabled{opacity:.5;cursor:not-allowed;}
  .link{color:#C4D0E2;font-size:13px;text-decoration:none;border:1px solid rgba(255,255,255,.14);padding:7px 12px;border-radius:9px;white-space:nowrap;}
  .link:hover{background:rgba(255,255,255,.08);color:#fff;}
  main{padding:18px;max-width:1280px;margin:0 auto;}
  .status{font-size:13px;color:#9FB0C8;margin:4px 0 14px;min-height:18px;}
  .status .warn{color:#ffc56b;} .status .err{color:#ff9b8a;} .status .ok{color:#7BE3B5;}
  .tblwrap{overflow-x:auto;border-radius:12px;border:1px solid rgba(255,255,255,.06);}
  table{width:100%;border-collapse:collapse;background:#101B2E;min-width:1280px;}
  th,td{padding:10px 12px;text-align:right;font-size:13px;border-bottom:1px solid rgba(255,255,255,.05);white-space:nowrap;vertical-align:top;}
  th:first-child,td:first-child{text-align:left;}
  th{background:#16233A;color:#9FB0C8;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.02em;position:sticky;top:0;z-index:2;}
  td.nm,th:first-child{position:sticky;left:0;background:#101B2E;z-index:1;min-width:160px;}
  th:first-child{background:#16233A;z-index:3;}
  td.num{font-variant-numeric:tabular-nums;}
  .tot{font-weight:600;font-variant-numeric:tabular-nums;}
  .auto{font-size:10px;color:#67788F;margin-top:2px;}
  tr.total td{background:#16233A;font-weight:700;color:#fff;}
  tr.total td.nm{background:#16233A;}
  .luong{color:#9FE3C4;font-weight:600;font-variant-numeric:tabular-nums;}
  .thucnhan{color:#FFD479;font-weight:800;font-variant-numeric:tabular-nums;}
  .neg{color:#ff9b8a;}
  /* Popup thưởng chi tiết */
  .thuong-wrap{position:relative;display:inline-block;}
  .thuong-btn{font-family:inherit;font-size:12.5px;color:#fff;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:4px 8px;cursor:pointer;min-width:104px;text-align:right;font-variant-numeric:tabular-nums;width:100%;}
  .thuong-btn:hover{border-color:#3D5AFE;background:rgba(61,90,254,.14);}
  .thuong-btn.has-data{border-color:rgba(255,196,107,.4);color:#ffc56b;}
  .thuong-popup{display:none;position:absolute;right:0;top:110%;z-index:100;background:#16233A;border:1px solid rgba(61,90,254,.5);border-radius:10px;padding:12px;min-width:220px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
  .thuong-popup.open{display:block;}
  .thuong-popup .tp-title{font-size:11px;font-weight:700;color:#9FB0C8;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;}
  .thuong-popup .tp-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .thuong-popup .tp-row:last-child{margin-bottom:0;}
  .thuong-popup .tp-label{font-size:12px;color:#C4D0E2;white-space:nowrap;}
  .thuong-popup input.tp-inp{font-family:inherit;font-size:12.5px;color:#fff;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:4px 6px;text-align:right;outline:none;width:110px;font-variant-numeric:tabular-nums;}
  .thuong-popup input.tp-inp:focus{border-color:#ffc56b;background:rgba(255,196,107,.08);}
  .thuong-popup .tp-total{font-size:12px;color:#ffc56b;font-weight:700;text-align:right;margin-top:8px;border-top:1px solid rgba(255,255,255,.07);padding-top:8px;}
  .leader{color:#C4A8FF;font-weight:700;font-variant-numeric:tabular-nums;}
  input.cell{width:104px;font-family:inherit;font-size:12.5px;color:#fff;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:4px 6px;text-align:right;outline:none;font-variant-numeric:tabular-nums;}
  input.cell:focus{border-color:#3D5AFE;background:rgba(61,90,254,.14);}
  input.cell::placeholder{color:#54657F;}
  button.exp{font-family:inherit;font-size:13px;line-height:1;color:#fff;background:rgba(61,90,254,.25);border:1px solid rgba(61,90,254,.5);width:22px;height:22px;border-radius:6px;cursor:pointer;margin-right:7px;vertical-align:middle;}
  button.exp:hover{background:rgba(61,90,254,.45);}
  .nmtop{display:flex;align-items:center;}
  .chip{display:inline-block;font-size:10px;background:rgba(61,90,254,.16);color:#A9B8FF;border:1px solid rgba(61,90,254,.4);padding:1px 6px;border-radius:8px;margin:4px 4px 0 0;}
  .panel{display:flex;flex-wrap:wrap;gap:10px;padding:10px 2px 4px;}
  .chcard{background:#0E1726;border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:10px 12px;min-width:215px;flex:1;}
  .chcard.has{border-color:#3D5AFE;box-shadow:0 0 0 1px rgba(61,90,254,.3) inset;}
  .chcard.ro{opacity:.9;background:#0c1320;}
  .chhead{font-weight:600;font-size:12.5px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;color:#E7EEF8;}
  .badge{font-size:10px;background:#3D5AFE;color:#fff;padding:1px 7px;border-radius:8px;}
  .frow{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:5px 0;font-size:12px;color:#9FB0C8;}
  .frow b{color:#E7EEF8;font-variant-numeric:tabular-nums;}
  .frow input.cell{width:118px;}
  .empty{padding:30px;text-align:center;color:#6B7C97;font-size:14px;}
  .note{font-size:12px;color:#7C8CA6;margin-top:12px;line-height:1.6;}
  @media(max-width:680px){ h1{font-size:15px;} th,td{padding:8px 8px;font-size:12px;} input.cell{width:88px;} td.nm,th:first-child{min-width:135px;} }
  .user-badge{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#9DB2FF;background:rgba(157,178,255,.1);border:1px solid rgba(157,178,255,.2);padding:7px 12px;border-radius:9px;font-weight:600;white-space:nowrap;}
  .xfer-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;opacity:.6;vertical-align:middle;display:none;}
  .xfer-btn:hover{opacity:1;}
  body.is-admin .xfer-btn{display:inline;}
  .thucnhan{white-space:nowrap;}
  .xfer-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:999;}
  .xfer-box{background:#1A2332;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:24px;min-width:340px;max-width:440px;}
  .xfer-box h3{margin:0 0 14px;font-size:15px;}
  .xfer-row{display:flex;align-items:center;gap:8px;margin:8px 0;}
  .xfer-label{font-size:12px;color:#9FB0C8;width:90px;flex-shrink:0;}
  .xfer-val{font-size:14px;font-weight:600;color:#ffc56b;}
  .xfer-inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#E7EEF8;border-radius:7px;padding:6px 10px;font-size:13px;flex:1;}
  .xfer-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
  .xfer-actions button{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;}
  .xfer-primary{background:#7BE3B5;color:#0B1322;}
  .xfer-secondary{background:rgba(255,255,255,.08);color:#E7EEF8;}
  .xfer-qr{text-align:center;margin-top:12px;}
  .xfer-qr img{border-radius:8px;max-width:200px;}
</style>
</head>
<body>
<header>
  <div class="top">
    <div style="flex:1;min-width:200px;">
      <h1>Bảng lương</h1>
      <p class="sub">Thực nhận = Lương 2% + Lương cứng + Thưởng − Phạt − BHXH · bấm ＋ để thêm doanh thu các kênh khác</p>
    </div>
    <div class="ctrl"><label>Tháng</label><input type="month" id="month" value="2026-05"></div>
    <button class="btn" id="refreshBtn">Xem</button>
    <button class="btn" id="publishBtn" style="background:#7BE3B5;color:#0B1322;">📤 Công khai lương</button>
    <a href="/" class="link">← Dashboard</a>
    <a href="/salary-product.html" class="link">Lương PTSP</a>
    <span class="user-badge" id="userBadge"></span>
    <a href="/logout" class="link">Đăng xuất</a>
  </div>
</header>

<main>
  <div class="status" id="status">Đang tải…</div>
  <div class="tblwrap">
    <table>
      <thead><tr>
        <th>Nhân viên</th><th>Doanh thu</th><th>Chi phí QC</th><th>Giá vốn</th><th>Phí ship</th>
        <th>Lương 2%</th><th>HH Leader</th><th>Lương cứng</th><th>Thưởng</th><th>Phạt</th><th>BHXH</th><th>Thực nhận</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div class="note" id="note"></div>
</main>

<script>
const vnd=n=>(Math.round(Number(n)||0)).toLocaleString('vi-VN');
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const normKey=s=>String(s==null?'':s).trim().toLowerCase().replace(/\s+/g,' ');
const num=v=>{const n=parseInt(String(v==null?'':v).replace(/[^\d-]/g,''),10);return isFinite(n)?n:0;};

const CH=[{id:'thailan',label:'Thái Lan'},{id:'pushsale',label:'Pushsale'},{id:'san',label:'Sàn TMĐT'}];
const MET=[{id:'dt',label:'Doanh thu'},{id:'qc',label:'Chi phí QC'},{id:'gv',label:'Giá vốn'},{id:'ship',label:'Phí ship'}];
const AUTOFIELD={dt:'doanhthu',qc:'chiPhiQC',gv:'giaVon',ship:'phiShip'};
let TYLE=0.02, AUTO=[], MAN={}, ROSTER=[], LIST=[], HHLEAD={};
// Cấu hình team mặc định (phòng khi server chưa gửi teamLead)
const TEAM_LEAD_DEFAULT={
  'Trịnh Đức Phương':['Đoàn Việt Hà','Nguyễn Duy Huân','Vũ Thuý An'],
  'Tạ Quang Trường':['Nguyễn Thị Trà My','Dương Văn Minh','Lê Thị Ánh'],
};
let TEAM_LEAD=TEAM_LEAD_DEFAULT;
// Tính Thưởng DTT phía client — cùng công thức với server
// DTT = Doanh thu - Giá vốn - Phí ship (KHÔNG trừ chi phí QC)
const DTT_BRACKETS=[
  {min:150e6,max:240e6,bonus:1e6},{min:240e6,max:330e6,bonus:2e6},
  {min:330e6,max:420e6,bonus:3e6},{min:420e6,max:510e6,bonus:4e6},
  {min:510e6,max:600e6,bonus:5e6},{min:600e6,max:690e6,bonus:6e6},
];
function tinhThuongDTT(dtt){
  if(dtt<150e6) return 0;
  for(const b of DTT_BRACKETS){ if(dtt>=b.min&&dtt<=b.max) return b.bonus; }
  if(dtt>690e6) return 6e6+Math.floor((dtt-690e6)/90e6+1)*1e6;
  return 0;
}

const THUONG_TYPES=[
  {id:'thuongDTT',      label:'Thưởng DTT',        auto:true,  hint:'Tự động theo DTT'},
  {id:'thuongNgayTuan', label:'Thưởng Ngày+Tuần',  auto:false, hint:'Nhập tay'},
  {id:'thuongTop1',     label:'Thưởng Top 1',       auto:true,  hint:'Tự động — lương 2% cao nhất'},
];
// Lưu thưởng tự động từ server (DTT + Top1) để hiển thị trong popup
let AUTO_THUONG = {}; // { normKey(name): { thuongDTT, thuongTop1 } }

function monthRange(m){const [y,mo]=m.split('-').map(Number);const since=`${y}-${String(mo).padStart(2,'0')}-01`;const last=new Date(y,mo,0).getDate();return {since,until:`${y}-${String(mo).padStart(2,'0')}-${String(last).padStart(2,'0')}`};}
function blankCh(){return {dt:0,qc:0,gv:0,ship:0};}
function manOf(name){
  const k=normKey(name); let o=MAN[k]||{};
  o={name:o.name||name, channels:o.channels||{}, luongCung:+o.luongCung||0, thuong:+o.thuong||0, thuongDTT:+o.thuongDTT||0, thuongNgayTuan:+o.thuongNgayTuan||0, thuongTop1:+o.thuongTop1||0, phat:+o.phat||0, bhxh:+o.bhxh||0, _hhLeader:+o._hhLeader||0};
  CH.forEach(c=>{o.channels[c.id]={...blankCh(),...(o.channels[c.id]||{})};});
  MAN[k]=o; return o;
}
const chSum=(m,metric)=>CH.reduce((s,c)=>s+(+m.channels[c.id][metric]||0),0);
const chHasData=(m,cid)=>MET.some(mt=>(+m.channels[cid][mt.id]||0)!==0);

async function load(){
  const mo=$('month').value, {since,until}=monthRange(mo);
  $('refreshBtn').disabled=true;
  $('status').innerHTML='<span class="warn">Đang tính lương (doanh thu, chi tiêu Meta, giá vốn)… ~15–25 giây.</span>';
  $('rows').innerHTML='';
  try{
    const [rRep,rMan]=await Promise.all([
      fetch('/api/salary/report?since='+since+'&until='+until),
      fetch('/api/salary/manual?month='+mo)
    ]);
    if(rRep.status===401){location.href='/login';return;}
    if(rRep.status===403){$('status').innerHTML='<span class="err">Chỉ quản trị viên xem được mục Lương.</span>';return;}
    const d=await rRep.json();
    if(!d.ok){$('status').innerHTML='<span class="err">'+esc(d.message||'Không lấy được dữ liệu')+'</span>';return;}
    const mj=await rMan.json().catch(()=>({data:{}}));
    AUTO=d.rows||[]; MAN=mj.data||{}; ROSTER=d.roster||[]; TYLE=d.tyLe||0.02;
    // thuongDTT và thuongTop1 sẽ tính lại phía client trong recomputeAll
    // Chỉ giữ lại thuongNgayTuan (nhập tay) từ manual data
    Object.values(MAN).forEach(m=>{ m.thuongDTT=0; m.thuongTop1=0; m.thuong=+m.thuongNgayTuan||0; });
    HHLEAD={}; AUTO_THUONG={}; TEAM_LEAD=(d.teamLead&&Object.keys(d.teamLead).length)?d.teamLead:TEAM_LEAD_DEFAULT;
    (d.rows||[]).forEach(r=>{
      if(r.hoaHongLeader) HHLEAD[normKey(r.name)]=r.hoaHongLeader;
      AUTO_THUONG[normKey(r.name)]={ thuongDTT: r.thuongDTT||0, thuongTop1: r.thuongTop1||0, dtt: r.dtt||0 };
    });
    buildList(); buildTable(); recomputeAll(); LIST.forEach((_,i)=>updateThuongPopup(i));
    const t=new Date(d.lastUpdated||Date.now());
    $('status').innerHTML='Cập nhật '+t.toLocaleString('vi-VN')+'  ·  tháng '+mo+'  ·  tỷ lệ '+(TYLE*100)+'%';
    $('note').innerHTML='4 cột đầu = số <b>tự động (TĐ)</b> từ Sandbox/Meta <b>＋ các kênh khác</b> bạn nhập tay (Thái Lan, Pushsale, Sàn TMĐT). '
      +'Bấm nút <b>＋</b> ở mỗi nhân viên để mở ô nhập theo từng kênh; kênh có dữ liệu sẽ hiện nhãn. '
      +'Lương 2% = (Doanh thu − Chi phí QC − Giá vốn − Phí ship) × 2%. HH Leader = ½ × tổng lương 2% nhân viên trong nhóm. <b>Thực nhận = Lương 2% + Lương cứng + Thưởng − Phạt − BHXH.</b> Nhập xong bấm ra ngoài ô là tự lưu.';
  }catch(e){$('status').innerHTML='<span class="err">Không kết nối được máy chủ: '+esc(e.message)+'</span>';}
  finally{$('refreshBtn').disabled=false;}
}

function buildList(){
  const autoBy={}; AUTO.forEach(r=>autoBy[normKey(r.name)]=r);
  const allowed=new Set([...ROSTER.map(normKey),...AUTO.map(r=>normKey(r.name))]);
  const seen=new Set(); LIST=[];
  const push=name=>{const k=normKey(name);if(seen.has(k))return;seen.add(k);LIST.push({name,key:k,a:autoBy[k]||{doanhthu:0,chiPhiQC:0,giaVon:0,phiShip:0,soDon:0}});};
  ROSTER.forEach(push);
  AUTO.forEach(r=>push(r.name));
  Object.keys(MAN).forEach(k=>{if(allowed.has(k))push((MAN[k]&&MAN[k].name)||k);});
}

function pInp(i,f,val){return '<input class="cell" inputmode="numeric" data-i="'+i+'" data-f="'+f+'" value="'+(val?vnd(val):'')+'" placeholder="0">';}
function cInp(i,ch,mt,val){return '<input class="cell" inputmode="numeric" data-i="'+i+'" data-ch="'+ch+'" data-m="'+mt+'" value="'+(val?vnd(val):'')+'" placeholder="0">';}
function autoVal(a,id){return a[AUTOFIELD[id]]||0;}

function detailHTML(i,emp){
  const m=manOf(emp.key);
  let cards='<div class="chcard ro"><div class="chhead">Sandbox (tự động)</div>'
    +MET.map(mt=>'<div class="frow"><span>'+mt.label+'</span><b>'+vnd(autoVal(emp.a,mt.id))+'</b></div>').join('')+'</div>';
  cards+=CH.map(c=>'<div class="chcard" id="card-'+i+'-'+c.id+'"><div class="chhead">'+c.label
    +' <span class="badge" id="bd-'+i+'-'+c.id+'" style="display:none">có DL</span></div>'
    +MET.map(mt=>'<div class="frow"><span>'+mt.label+'</span>'+cInp(i,c.id,mt.id,m.channels[c.id][mt.id])+'</div>').join('')
    +'</div>').join('');
  return '<tr class="drow" id="det-'+i+'" style="display:none"><td colspan="12"><div class="panel">'+cards+'</div></td></tr>';
}

function buildTable(){
  const tb=$('rows');
  if(!LIST.length){tb.innerHTML='<tr><td colspan="12" class="empty">Không có dữ liệu trong tháng này.</td></tr>';return;}
  let html='';
  LIST.forEach((emp,i)=>{
    const m=manOf(emp.key);
    html+='<tr class="mrow">'
      +'<td class="nm"><div class="nmtop"><button class="exp" data-exp="'+i+'">＋</button>'+esc(emp.name)+'</div><div class="bdg" id="bdg-'+i+'"></div></td>'
      +'<td class="num" id="dt-'+i+'"></td><td class="num" id="qc-'+i+'"></td><td class="num" id="gv-'+i+'"></td><td class="num" id="ship-'+i+'"></td>'
      +'<td class="luong" id="l2-'+i+'"></td>'
      +'<td class="leader" id="hl-'+i+'">–</td>'
      +'<td>'+pInp(i,'luongCung',m.luongCung)+'</td>'
      +'<td><div class="thuong-wrap" id="tw-'+i+'">'
      +'<button class="thuong-btn" id="tb-'+i+'" onclick="toggleThuong('+i+')">–</button>'
      +'<div class="thuong-popup" id="tp-'+i+'">'
      +'<div class="tp-title">Chi tiết thưởng</div>'
      +'<div style="font-size:11px;color:#9FB0C8;margin-bottom:8px;" id="dtt-hint-'+i+'"></div>'
      +THUONG_TYPES.map(t=>
        t.auto
          ? '<div class="tp-row"><span class="tp-label">'+t.label+' <span style="font-size:10px;color:#7BE3B5">(tự động)</span></span>'
            +'<b class="tp-auto" id="ta-'+i+'-'+t.id+'" style="color:#ffc56b;font-size:13px;">–</b></div>'
          : '<div class="tp-row"><span class="tp-label">'+t.label+'</span>'
            +'<input class="tp-inp" inputmode="numeric" data-i="'+i+'" data-tf="'+t.id+'" placeholder="0"></div>'
      ).join('')
      +'<div class="tp-total" id="tpt-'+i+'">Tổng: 0 ₫</div>'
      +'</div></div></td>'
      +'<td>'+pInp(i,'phat',m.phat)+'</td><td>'+pInp(i,'bhxh',m.bhxh)+'</td>'
      +'<td class="thucnhan" id="tn-'+i+'"><span id="tnv-'+i+'"></span>'
      +'<button class="xfer-btn" id="xf-'+i+'" onclick="xferSalary('+i+')" title="Chuyển lương">💸</button></td></tr>';
    html+=detailHTML(i,emp);
  });
  html+='<tr class="total"><td class="nm">Tổng ('+LIST.length+')</td>'
    +'<td class="num" id="t-dt"></td><td class="num" id="t-qc"></td><td class="num" id="t-gv"></td><td class="num" id="t-ship"></td>'
    +'<td class="luong" id="t-l2"></td><td class="leader" id="t-hl"></td><td class="num" id="t-lc"></td><td class="num" id="t-th"></td><td class="num" id="t-ph"></td><td class="num" id="t-bh"></td>'
    +'<td class="thucnhan" id="t-tn"></td></tr>';
  tb.innerHTML=html;
  tb.querySelectorAll('button.exp').forEach(b=>b.addEventListener('click',()=>toggle(+b.getAttribute('data-exp'),b)));
  tb.querySelectorAll('input.cell').forEach(el=>el.addEventListener('change',onEdit));
  tb.querySelectorAll('input.tp-inp').forEach(el=>el.addEventListener('change',onEdit));
}
function toggle(i,btn){const r=$('det-'+i);const open=r.style.display==='none';r.style.display=open?'':'none';btn.textContent=open?'−':'＋';}

function srcCell(id,i,total,auto,manual){
  $(id+'-'+i).innerHTML='<div class="tot">'+vnd(total)+'</div><div class="auto">TĐ '+vnd(auto)+(manual?' · kênh '+vnd(manual):'')+'</div>';
}
function recompute(i){
  const emp=LIST[i], m=manOf(emp.key), a=emp.a;
  const mDt=chSum(m,'dt'),mQc=chSum(m,'qc'),mGv=chSum(m,'gv'),mSh=chSum(m,'ship');
  const DT=autoVal(a,'dt')+mDt, QC=autoVal(a,'qc')+mQc, GV=autoVal(a,'gv')+mGv, SHIP=autoVal(a,'ship')+mSh;
  const l2=Math.round((DT-QC-GV-SHIP)*TYLE);
  srcCell('dt',i,DT,autoVal(a,'dt'),mDt); srcCell('qc',i,QC,autoVal(a,'qc'),mQc);
  srcCell('gv',i,GV,autoVal(a,'gv'),mGv); srcCell('ship',i,SHIP,autoVal(a,'ship'),mSh);
  const hl=+m._hhLeader||0;  // HH Leader đã set trong recomputeAll
  // Tính Thưởng DTT từ DT-GV-SHIP thực tế (gồm cả kênh nhập tay)
  const dtt=DT-GV-SHIP;
  m.thuongDTT=tinhThuongDTT(dtt);
  // thuongTop1 sẽ được gán sau trong recomputeAll (cần so sánh toàn bộ)
  m.thuong=THUONG_TYPES.reduce((s,t)=>s+(+m[t.id]||0),0);
  // Tính thực nhận SAU khi đã có đủ thưởng
  const tn=l2+m.luongCung+m.thuong-m.phat-m.bhxh;
  const l2e=$('l2-'+i); l2e.textContent=vnd(l2); l2e.className=l2<0?'luong neg':'luong';
  const hle=$('hl-'+i); if(hle){ hle.textContent=hl>0?vnd(hl)+'₫':'–'; }
  const tnWithHl=tn+hl;
  const tne=$('tn-'+i); const tnve=$('tnv-'+i);
  if(tnve) tnve.textContent=vnd(tnWithHl)+' ₫';
  if(tne) tne.className=tnWithHl<0?'thucnhan neg':'thucnhan';
  // nhãn kênh có dữ liệu + viền thẻ
  let chips='';
  CH.forEach(c=>{const has=chHasData(m,c.id);
    const card=$('card-'+i+'-'+c.id), bd=$('bd-'+i+'-'+c.id);
    if(card)card.className='chcard'+(has?' has':''); if(bd)bd.style.display=has?'':'none';
    if(has)chips+='<span class="chip">'+c.label+'</span>';});
  $('bdg-'+i).innerHTML=chips;
  // Cập nhật nút Thưởng (hiển thị tổng thưởng đã gồm DTT + Top1 + Ngày/Tuần)
  const tbtn=$('tb-'+i);
  if(tbtn){ tbtn.textContent=m.thuong>0?vnd(m.thuong)+' ₫':'–'; tbtn.className='thuong-btn'+(m.thuong>0?' has-data':''); }
  emp._c={DT,QC,GV,SHIP,l2,hl,lc:m.luongCung,th:m.thuong,ph:m.phat,bh:m.bhxh,tn:tnWithHl};
}
function updateTotals(){
  const T={DT:0,QC:0,GV:0,SHIP:0,l2:0,hl:0,lc:0,th:0,ph:0,bh:0,tn:0};
  LIST.forEach(e=>{const c=e._c||{};for(const k in T)T[k]+=c[k]||0;});
  $('t-dt').textContent=vnd(T.DT);$('t-qc').textContent=vnd(T.QC);$('t-gv').textContent=vnd(T.GV);$('t-ship').textContent=vnd(T.SHIP);
  $('t-l2').textContent=vnd(T.l2);$('t-hl').textContent=vnd(T.hl);$('t-lc').textContent=vnd(T.lc);$('t-th').textContent=vnd(T.th);$('t-ph').textContent=vnd(T.ph);$('t-bh').textContent=vnd(T.bh);
  $('t-tn').textContent=vnd(T.tn)+' ₫';
}
function recomputeAll(){
  // ── Vòng 1: reset HH Leader + Top1, tính lương 2% thực tế từng người ──
  LIST.forEach(emp=>{ const m=manOf(emp.key); m._hhLeader=0; m.thuongTop1=0; });
  LIST.forEach((_,i)=>recompute(i));

  // ── Tính HH Leader: ½ tổng lương 2% (KHÔNG gồm Sàn TMĐT/Shopee) ──
  const l2ByName={};
  LIST.forEach(emp=>{
    const m=manOf(emp.key);
    const l2Full=(emp._c&&emp._c.l2)||0;
    // Trừ phần lương 2% đến từ kênh "san" (Sàn TMĐT = Shopee)
    const san=m.channels['san']||{dt:0,qc:0,gv:0,ship:0};
    const sanNet=(+san.dt||0)-(+san.qc||0)-(+san.gv||0)-(+san.ship||0);
    const l2San=Math.round(sanNet*TYLE);
    l2ByName[normKey(emp.name)]=l2Full-l2San;
  });
  const teamByKey={};
  Object.keys(TEAM_LEAD).forEach(lead=>{ teamByKey[normKey(lead)]=TEAM_LEAD[lead]; });
  LIST.forEach(emp=>{
    const members=teamByKey[normKey(emp.name)];
    if(!members) return;
    let tong=0;
    members.forEach(name=>{ tong+=l2ByName[normKey(name)]||0; });
    manOf(emp.key)._hhLeader=Math.round(tong/2);
  });

  // ── Xác định Top 1: lương 2% cao nhất (duy nhất) ──
  const eligible=LIST.map((emp,i)=>({i,l2:(emp._c&&emp._c.l2)||0})).filter(x=>x.l2>0);
  if(eligible.length){
    eligible.sort((a,b)=>b.l2-a.l2);
    if(eligible.length===1||eligible[0].l2!==eligible[1].l2){
      manOf(LIST[eligible[0].i].key).thuongTop1=Math.round(eligible[0].l2/2);
    }
  }

  // ── Vòng 2: vẽ lại TẤT CẢ với HH Leader + Top1 đã có ──
  LIST.forEach((_,i)=>recompute(i));
  updateTotals();
}

let saveTimer=null;
async function onEdit(e){
  const el=e.target, i=+el.getAttribute('data-i'), emp=LIST[i], m=manOf(emp.key), v=num(el.value);
  if(el.hasAttribute('data-tf')){ m[el.getAttribute('data-tf')]=v; m.thuong=THUONG_TYPES.reduce((s,t)=>s+(+m[t.id]||0),0); updateThuongPopup(i); }
  else if(el.hasAttribute('data-f')) m[el.getAttribute('data-f')]=v;
  else m.channels[el.getAttribute('data-ch')][el.getAttribute('data-m')]=v;
  el.value=v?vnd(v):'';
  recomputeAll(); save(emp);
}
async function save(emp){
  try{
    const r=await fetch('/api/salary/manual',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({month:$('month').value,name:emp.name,values:manOf(emp.key)})});
    flash(r.ok?'Đã lưu ✓':'Lưu lỗi',!r.ok);
  }catch(err){flash('Lưu lỗi, thử lại',true);}
}
function flash(msg,bad){const s=$('status'),old=s.getAttribute('data-base')||s.innerHTML;s.setAttribute('data-base',old);s.innerHTML='<span class="'+(bad?'err':'ok')+'">'+esc(msg)+'</span>';clearTimeout(saveTimer);saveTimer=setTimeout(()=>{s.innerHTML=s.getAttribute('data-base');},1400);}


function toggleThuong(i){
  document.querySelectorAll('.thuong-popup.open').forEach(p=>{if(p.id!=='tp-'+i)p.classList.remove('open');});
  const p=$('tp-'+i); p.classList.toggle('open');
  if(p.classList.contains('open')){
    const emp=LIST[i], m=manOf(emp.key);
    const at=AUTO_THUONG[emp.key]||{};
    // Hiển thị hint DTT
    const hint=$('dtt-hint-'+i);
    // Tính DTT thực tế từ _c (bao gồm cả kênh nhập tay)
    const ec=emp._c||{};
    const dttReal=(ec.DT||0)-(ec.GV||0)-(ec.SHIP||0);
    if(hint) hint.textContent=dttReal>0?'DTT tháng này: '+vnd(dttReal)+' ₫':'';
    // Điền giá trị từng loại
    THUONG_TYPES.forEach(t=>{
      if(t.auto){
        const el=$('ta-'+i+'-'+t.id);
        // Cả DTT và Top1 đều tính phía client trong recomputeAll
        const val=m[t.id]||0;
        if(el) el.textContent=val>0?vnd(val)+' ₫':'–';
      } else {
        const inp=p.querySelector('[data-tf="'+t.id+'"]');
        if(inp) inp.value=m[t.id]?vnd(m[t.id]):'';
      }
    });
    updateThuongPopup(i);
  }
}
function updateThuongPopup(i){
  const emp=LIST[i], m=manOf(emp.key);
  // KHÔNG ghi đè m.thuongDTT / m.thuongTop1 từ server
  // vì đã được tính chính xác phía client trong recompute/recomputeAll
  const total=THUONG_TYPES.reduce((s,t)=>s+(+m[t.id]||0),0);
  const tpt=$('tpt-'+i); if(tpt) tpt.textContent='Tổng: '+vnd(total)+' ₫';
  const tb=$('tb-'+i);
  if(tb){
    tb.textContent=total>0?vnd(total)+' ₫':'–';
    tb.className='thuong-btn'+(total>0?' has-data':'');
  }
}

  $('publishBtn').disabled=true;
  $('publishBtn').textContent='Đang gửi…';
  // Soạn dữ liệu từng người (gồm các khoản đã tính client)
  const rows=LIST.filter(e=>e.name!=='Admin').map(e=>{
    const m=manOf(e.key), c=e._c||{};
    const a=e.a||{};
    // Chi tiết kênh nhập tay (auto = số từ Sandbox/Meta, kênh = nhập tay)
    const channels={};
    CH.forEach(ch=>{ const cd=m.channels[ch.id]||{}; channels[ch.id]={dt:+cd.dt||0,qc:+cd.qc||0,gv:+cd.gv||0,ship:+cd.ship||0}; });
    return {
      name:e.name,
      doanhthu:c.DT||0, chiPhiQC:c.QC||0, giaVon:c.GV||0, phiShip:c.SHIP||0,
      luong:c.l2||0,
      // Số tự động (Sandbox/Meta) để hiển thị "TĐ ..."
      autoDT:autoVal(a,'dt'), autoQC:autoVal(a,'qc'), autoGV:autoVal(a,'gv'), autoSHIP:autoVal(a,'ship'),
      channels,
      extra:{ hoaHongLeader:m._hhLeader||0, luongCung:m.luongCung||0,
        thuong:m.thuong||0, thuongDTT:m.thuongDTT||0, thuongTop1:m.thuongTop1||0, thuongNgayTuan:m.thuongNgayTuan||0,
        phat:m.phat||0, bhxh:m.bhxh||0 }
    };
  });
  try{
    const res=await fetch('/api/salary/publish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({month,rows})});
    const d=await res.json();
    if(!d.ok){ alert('❌ '+(d.message||'Không gửi được')); }
    else{
      alert('✅ Đã công khai bảng lương cho '+(d.count||0)+' nhân viên.\nNhân viên có thể xem trong trang "Lương của tôi".');
    }
  }catch(e){ alert('❌ Lỗi: '+e.message); }
  finally{ $('publishBtn').disabled=false; $('publishBtn').textContent='📤 Công khai lương'; }
});

const BANKS=[{bin:'970436',name:'Vietcombank',short:'VCB'},{bin:'970422',name:'MB Bank',short:'MB'},{bin:'970407',name:'Techcombank',short:'TCB'},{bin:'970432',name:'VPBank',short:'VPB'}];
let BANK_DATA={};
fetch('/api/bank-accounts').then(r=>r.ok?r.json():{}).then(d=>{BANK_DATA=d||{};}).catch(()=>{});

function xferSalary(i){
  const emp=LIST[i]; if(!emp) return;
  const c=emp._c||{};
  const amount=c.tn||0;
  const monthNum=($('month').value||'').split('-')[1]||'';
  const desc='HKD TD chuyển lương '+emp.name+' tháng '+parseInt(monthNum);
  const k=normKey(emp.name);
  const bank=BANK_DATA[k]||{};

  // Tạo modal
  let h='<div class="xfer-modal" id="xferModal" onclick="if(event.target===this)this.remove()">';
  h+='<div class="xfer-box">';
  h+='<h3>💸 Chuyển lương — '+esc(emp.name)+'</h3>';
  h+='<div class="xfer-row"><span class="xfer-label">Số tiền</span><span class="xfer-val">'+vnd(amount)+' ₫</span></div>';
  h+='<div class="xfer-row"><span class="xfer-label">Nội dung</span><span style="font-size:13px;">'+esc(desc)+'</span></div>';
  h+='<hr style="border-color:rgba(255,255,255,.08);margin:12px 0;">';
  h+='<div style="font-size:12px;color:#9FB0C8;margin-bottom:6px;">Tài khoản nhận (lưu lại cho lần sau)</div>';
  h+='<div class="xfer-row"><span class="xfer-label">Ngân hàng</span><select class="xfer-inp" id="xf-bank">';
  h+='<option value="">Chọn ngân hàng…</option>';
  BANKS.forEach(b=>{h+='<option value="'+b.bin+'" '+(bank.bankBin===b.bin?'selected':'')+'>'+b.name+'</option>';});
  h+='</select></div>';
  h+='<div class="xfer-row"><span class="xfer-label">Số tài khoản</span><input class="xfer-inp" id="xf-acc" value="'+(bank.accountNo||'')+'" placeholder="Nhập STK"></div>';
  h+='<div id="xf-qr" class="xfer-qr"></div>';
  h+='<div class="xfer-actions">';
  h+='<button class="xfer-secondary" onclick="document.getElementById(\'xferModal\').remove()">Đóng</button>';
  h+='<button class="xfer-secondary" onclick="xferCopy('+i+')">📋 Copy</button>';
  h+='<button class="xfer-primary" onclick="xferGo('+i+')">Chuyển khoản →</button>';
  h+='</div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
  // Hiện QR nếu đã có bank info
  if(bank.bankBin && bank.accountNo) showXferQR(bank.bankBin,bank.accountNo,emp.name,amount,desc);
  // Auto update QR khi thay đổi
  $('xf-bank').addEventListener('change',()=>updateXferPreview(i));
  $('xf-acc').addEventListener('input',()=>updateXferPreview(i));
}

function updateXferPreview(i){
  const emp=LIST[i]; const c=emp._c||{};
  const amount=c.tn||0;
  const monthNum=($('month').value||'').split('-')[1]||'';
  const desc='HKD TD chuyển lương '+emp.name+' tháng '+parseInt(monthNum);
  const bin=$('xf-bank').value, acc=$('xf-acc').value;
  if(bin&&acc) showXferQR(bin,acc,emp.name,amount,desc);
  else $('xf-qr').innerHTML='';
}

function showXferQR(bin,acc,name,amount,desc){
  const qr=$('xf-qr'); if(!qr)return;
  const url='https://img.vietqr.io/image/'+bin+'-'+acc+'-compact2.png?amount='+amount+'&addInfo='+encodeURIComponent(desc)+'&accountName='+encodeURIComponent(name.toUpperCase());
  qr.innerHTML='<img src="'+url+'" alt="VietQR" onerror="this.style.display=\'none\'">';
}

function xferCopy(i){
  const emp=LIST[i]; const c=emp._c||{};
  const monthNum=($('month').value||'').split('-')[1]||'';
  const desc='HKD TD chuyển lương '+emp.name+' tháng '+parseInt(monthNum);
  const txt=desc+'\nSố tiền: '+vnd(c.tn||0)+' ₫';
  navigator.clipboard.writeText(txt).then(()=>alert('Đã copy nội dung chuyển khoản')).catch(()=>{});
}

async function xferGo(i){
  const emp=LIST[i]; const c=emp._c||{};
  const amount=c.tn||0;
  const monthNum=($('month').value||'').split('-')[1]||'';
  const desc='HKD TD chuyển lương '+emp.name+' tháng '+parseInt(monthNum);
  const bin=$('xf-bank').value, acc=$('xf-acc').value;
  // Lưu bank info
  if(bin||acc){
    const bankObj=BANKS.find(b=>b.bin===bin);
    const payload={name:emp.name, bankBin:bin, bankName:bankObj?bankObj.name:'', accountNo:acc};
    BANK_DATA[normKey(emp.name)]=payload;
    try{await fetch('/api/bank-accounts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});}catch(e){}
  }
  if(!bin||!acc){alert('Vui lòng chọn ngân hàng và nhập số tài khoản');return;}
  // Mở deep link VietQR
  const bankShort=(BANKS.find(b=>b.bin===bin)||{}).short||bin;
  const url='https://dl.vietqr.io/pay?app='+bankShort+'&ba='+acc+'&bn='+encodeURIComponent(emp.name.toUpperCase())+'&am='+amount+'&info='+encodeURIComponent(desc);
  window.open(url,'_blank');
}
