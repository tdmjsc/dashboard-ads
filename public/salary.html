<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảng lương — Check ADS TDMJSC</title>
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0B1322;color:#E7EEF8;}
  header{background:#10192B;border-bottom:1px solid rgba(255,255,255,.07);padding:14px 18px;}
  .top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  h1{font-size:17px;margin:0;}
  .sub{color:#9FB0C8;font-size:12px;margin:2px 0 0;font-weight:400;}
  .ctrl{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);padding:7px 11px;border-radius:9px;}
  .ctrl label{font-size:11px;color:#9FB0C8;}
  .ctrl input{font-family:'Inter';font-size:13px;color:#fff;background:transparent;border:none;outline:none;color-scheme:dark;}
  .btn{font-family:'Inter';font-size:13px;font-weight:600;color:#fff;background:#3D5AFE;border:none;padding:8px 16px;border-radius:9px;cursor:pointer;white-space:nowrap;}
  .btn:hover{background:#2f49d6;} .btn:disabled{opacity:.5;cursor:not-allowed;}
  .link{color:#C4D0E2;font-size:13px;text-decoration:none;border:1px solid rgba(255,255,255,.14);padding:7px 12px;border-radius:9px;white-space:nowrap;}
  .link:hover{background:rgba(255,255,255,.08);color:#fff;}
  main{padding:18px;max-width:1280px;margin:0 auto;}
  .status{font-size:13px;color:#9FB0C8;margin:4px 0 14px;min-height:18px;}
  .status .warn{color:#ffc56b;} .status .err{color:#ff9b8a;} .status .ok{color:#7BE3B5;}
  .tblwrap{overflow-x:auto;border-radius:12px;border:1px solid rgba(255,255,255,.06);}
  table{width:100%;border-collapse:collapse;background:#101B2E;min-width:1100px;}
  th,td{padding:10px 12px;text-align:right;font-size:13px;border-bottom:1px solid rgba(255,255,255,.05);white-space:nowrap;vertical-align:top;}
  th:first-child,td:first-child{text-align:left;}
  th{background:#16233A;color:#9FB0C8;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.02em;position:sticky;top:0;}
  td.nm,th:first-child{position:sticky;left:0;background:#101B2E;z-index:2;}
  th:first-child{background:#16233A;z-index:3;}
  td.num{font-variant-numeric:tabular-nums;}
  .tot{font-weight:600;font-variant-numeric:tabular-nums;}
  .auto{font-size:10px;color:#67788F;margin:1px 0 4px;}
  tr.total td{background:#16233A;font-weight:700;color:#fff;position:sticky;bottom:0;}
  tr.total td.nm{background:#16233A;}
  .luong{color:#9FE3C4;font-weight:600;font-variant-numeric:tabular-nums;}
  .thucnhan{color:#FFD479;font-weight:800;font-variant-numeric:tabular-nums;}
  .neg{color:#ff9b8a;}
  input.cell{width:96px;font-family:inherit;font-size:12.5px;color:#fff;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:4px 6px;text-align:right;outline:none;font-variant-numeric:tabular-nums;}
  input.cell:focus{border-color:#3D5AFE;background:rgba(61,90,254,.14);}
  input.cell::placeholder{color:#54657F;}
  .empty{padding:30px;text-align:center;color:#6B7C97;font-size:14px;}
  .note{font-size:12px;color:#7C8CA6;margin-top:12px;line-height:1.6;}
  @media(max-width:680px){ h1{font-size:15px;} th,td{padding:8px 8px;font-size:12px;} input.cell{width:82px;} }
</style>
</head>
<body>
<header>
  <div class="top">
    <div style="flex:1;min-width:200px;">
      <h1>Bảng lương</h1>
      <p class="sub">Thực nhận = Lương 2% + Lương cứng + Thưởng − Phạt − BHXH · các ô có viền là nhập tay, tự lưu</p>
    </div>
    <div class="ctrl">
      <label>Tháng</label><input type="month" id="month" value="2026-05">
    </div>
    <button class="btn" id="refreshBtn">Xem</button>
    <a href="/" class="link">← Dashboard</a>
    <a href="/logout" class="link">Đăng xuất</a>
  </div>
</header>

<main>
  <div class="status" id="status">Đang tải…</div>
  <div class="tblwrap">
    <table>
      <thead>
        <tr>
          <th>Nhân viên</th>
          <th>Doanh thu</th>
          <th>Chi phí QC</th>
          <th>Giá vốn</th>
          <th>Phí ship</th>
          <th>Lương 2%</th>
          <th>Lương cứng</th>
          <th>Thưởng</th>
          <th>Phạt</th>
          <th>BHXH</th>
          <th>Thực nhận</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div class="note" id="note"></div>
</main>

<script>
const vnd=n=>(Math.round(Number(n)||0)).toLocaleString('vi-VN');
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const normKey=s=>String(s==null?'':s).trim().toLowerCase().replace(/\s+/g,' ');
const num=v=>{const n=parseInt(String(v==null?'':v).replace(/[^\d-]/g,''),10);return isFinite(n)?n:0;};

let TYLE=0.02, AUTO=[], MAN={}, META={};

function monthRange(m){
  const [y,mo]=m.split('-').map(Number);
  const since=`${y}-${String(mo).padStart(2,'0')}-01`;
  const last=new Date(y,mo,0).getDate();
  const until=`${y}-${String(mo).padStart(2,'0')}-${String(last).padStart(2,'0')}`;
  return {since,until};
}
function manOf(name){
  const k=normKey(name);
  const d={name,dt:0,qc:0,gv:0,ship:0,luongCung:0,thuong:0,phat:0,bhxh:0};
  MAN[k]={...d,...(MAN[k]||{})};
  return MAN[k];
}

async function load(){
  const m=$('month').value;
  const {since,until}=monthRange(m);
  $('refreshBtn').disabled=true;
  $('status').innerHTML='<span class="warn">Đang tính lương (doanh thu, chi tiêu Meta, giá vốn)… có thể mất ~15–25 giây.</span>';
  $('rows').innerHTML='';
  try{
    const [rRep,rMan]=await Promise.all([
      fetch('/api/salary/report?since='+since+'&until='+until),
      fetch('/api/salary/manual?month='+m)
    ]);
    if(rRep.status===401){ location.href='/login'; return; }
    if(rRep.status===403){ $('status').innerHTML='<span class="err">Chỉ quản trị viên xem được mục Lương.</span>'; return; }
    const d=await rRep.json();
    if(!d.ok){ $('status').innerHTML='<span class="err">'+esc(d.message||'Không lấy được dữ liệu')+'</span>'; return; }
    const mj=await rMan.json().catch(()=>({data:{}}));
    AUTO=d.rows||[]; MAN=mj.data||{}; TYLE=d.tyLe||0.02; META=d;
    renderTable();
    const t=new Date(d.lastUpdated||Date.now());
    $('status').innerHTML='Cập nhật '+t.toLocaleString('vi-VN')+'  ·  tháng '+m+'  ·  tỷ lệ '+(TYLE*100)+'%';
    $('note').innerHTML='4 cột đầu: số <b>tự động (TĐ)</b> từ Sandbox/Meta, ô có viền là <b>cộng thêm tay</b> (kênh khác). '
      +'Lương 2% = (Doanh thu − Chi phí QC − Giá vốn − Phí ship) × 2%. '
      +'<b>Thực nhận = Lương 2% + Lương cứng + Thưởng − Phạt − BHXH.</b> Nhập xong bấm ra ngoài ô là tự lưu.';
  }catch(e){ $('status').innerHTML='<span class="err">Không kết nối được máy chủ: '+esc(e.message)+'</span>'; }
  finally{ $('refreshBtn').disabled=false; }
}

function inp(name,field,val){
  return '<input class="cell" inputmode="numeric" data-n="'+esc(name)+'" data-f="'+field+'" value="'+(val?vnd(val):'')+'" placeholder="0">';
}
function autoCell(total,autoV,name,field){
  return '<td class="num"><div class="tot">'+vnd(total)+'</div><div class="auto">TĐ '+vnd(autoV)+'</div>'+inp(name,field,manOf(name)[field])+'</td>';
}

function renderTable(){
  const tb=$('rows');
  const seen=new Set(), list=[];
  AUTO.forEach(r=>{const k=normKey(r.name);seen.add(k);list.push({name:r.name,a:r});});
  Object.keys(MAN).forEach(k=>{ if(!seen.has(k)) list.push({name:(MAN[k]&&MAN[k].name)||k,a:{doanhthu:0,chiPhiQC:0,giaVon:0,phiShip:0,soDon:0}}); });
  if(!list.length){ tb.innerHTML='<tr><td colspan="11" class="empty">Không có dữ liệu trong tháng này.</td></tr>'; return; }
  const T={dt:0,qc:0,gv:0,ship:0,l2:0,lc:0,th:0,ph:0,bh:0,tn:0};
  const html=list.map(it=>{
    const a=it.a, m=manOf(it.name);
    const DT=(a.doanhthu||0)+m.dt, QC=(a.chiPhiQC||0)+m.qc, GV=(a.giaVon||0)+m.gv, SHIP=(a.phiShip||0)+m.ship;
    const l2=Math.round((DT-QC-GV-SHIP)*TYLE);
    const tn=l2+m.luongCung+m.thuong-m.phat-m.bhxh;
    T.dt+=DT;T.qc+=QC;T.gv+=GV;T.ship+=SHIP;T.l2+=l2;T.lc+=m.luongCung;T.th+=m.thuong;T.ph+=m.phat;T.bh+=m.bhxh;T.tn+=tn;
    return '<tr>'
      +'<td class="nm">'+esc(it.name)+'</td>'
      +autoCell(DT,a.doanhthu||0,it.name,'dt')
      +autoCell(QC,a.chiPhiQC||0,it.name,'qc')
      +autoCell(GV,a.giaVon||0,it.name,'gv')
      +autoCell(SHIP,a.phiShip||0,it.name,'ship')
      +'<td class="'+(l2<0?'luong neg':'luong')+'">'+vnd(l2)+'</td>'
      +'<td>'+inp(it.name,'luongCung',m.luongCung)+'</td>'
      +'<td>'+inp(it.name,'thuong',m.thuong)+'</td>'
      +'<td>'+inp(it.name,'phat',m.phat)+'</td>'
      +'<td>'+inp(it.name,'bhxh',m.bhxh)+'</td>'
      +'<td class="'+(tn<0?'thucnhan neg':'thucnhan')+'">'+vnd(tn)+' ₫</td>'
      +'</tr>';
  }).join('');
  const totalRow='<tr class="total">'
    +'<td class="nm">Tổng ('+list.length+')</td>'
    +'<td class="num">'+vnd(T.dt)+'</td><td class="num">'+vnd(T.qc)+'</td><td class="num">'+vnd(T.gv)+'</td><td class="num">'+vnd(T.ship)+'</td>'
    +'<td class="luong">'+vnd(T.l2)+'</td>'
    +'<td class="num">'+vnd(T.lc)+'</td><td class="num">'+vnd(T.th)+'</td><td class="num">'+vnd(T.ph)+'</td><td class="num">'+vnd(T.bh)+'</td>'
    +'<td class="thucnhan">'+vnd(T.tn)+' ₫</td>'
    +'</tr>';
  tb.innerHTML=html+totalRow;
  document.querySelectorAll('input.cell').forEach(el=>el.addEventListener('change',onEdit));
}

let saveTimer=null;
async function onEdit(e){
  const el=e.target, name=el.getAttribute('data-n'), field=el.getAttribute('data-f');
  manOf(name)[field]=num(el.value);
  renderTable();
  try{
    const r=await fetch('/api/salary/manual',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({month:$('month').value,name,values:manOf(name)})});
    if(r.ok){ flash('Đã lưu ✓'); }
  }catch(err){ flash('Lưu lỗi, thử lại',true); }
}
function flash(msg,bad){
  const s=$('status'); const old=s.innerHTML;
  s.innerHTML='<span class="'+(bad?'err':'ok')+'">'+esc(msg)+'</span>';
  clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ s.innerHTML=old; },1500);
}

$('refreshBtn').addEventListener('click',load);
$('month').addEventListener('change',load);
load();
</script>
</body>
</html>
