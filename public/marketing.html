<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing — Check ADS TDMJSC</title>
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0B1322;color:#E7EEF8;}
  header{background:#10192B;border-bottom:1px solid rgba(255,255,255,.07);padding:14px 18px;}
  .top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  h1{font-size:17px;margin:0;flex:1;min-width:180px;}
  .sub{color:#9FB0C8;font-size:12px;margin:2px 0 0;font-weight:400;}
  .daterange{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);padding:7px 11px;border-radius:9px;}
  .daterange label{font-size:11px;color:#9FB0C8;}
  .daterange input[type=date]{font-family:'Inter';font-size:12.5px;color:#fff;background:transparent;border:none;outline:none;color-scheme:dark;}
  .btn{font-family:'Inter';font-size:13px;font-weight:600;color:#fff;background:#3D5AFE;border:none;padding:8px 16px;border-radius:9px;cursor:pointer;white-space:nowrap;}
  .btn:hover{background:#2f49d6;} .btn:disabled{opacity:.5;cursor:not-allowed;}
  .link{color:#C4D0E2;font-size:13px;text-decoration:none;border:1px solid rgba(255,255,255,.14);padding:7px 12px;border-radius:9px;white-space:nowrap;}
  .link:hover{background:rgba(255,255,255,.08);color:#fff;}
  main{padding:18px;max-width:1000px;margin:0 auto;}
  .status{font-size:13px;color:#9FB0C8;margin:4px 0 16px;min-height:18px;}
  .status .warn{color:#ffc56b;} .status .err{color:#ff9b8a;}
  table{width:100%;border-collapse:collapse;background:#101B2E;border-radius:12px;overflow:hidden;}
  th,td{padding:12px 14px;text-align:left;font-size:13.5px;border-bottom:1px solid rgba(255,255,255,.05);}
  th{background:#16233A;color:#9FB0C8;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em;}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;}
  tr:last-child td{border-bottom:none;}
  tr.total td{background:#16233A;font-weight:700;color:#fff;}
  .rev{color:#7BE3B5;font-weight:600;}
  tr.emp{cursor:pointer;} tr.emp:hover td{background:#16243c;}
  .pcount{color:#6B7C97;font-size:11.5px;font-weight:400;}
  tr.detail td{background:#0d1726;padding:0;}
  .prodbox{padding:10px 14px 14px;}
  .ptbl{width:100%;background:transparent;}
  .ptbl th{background:transparent;border-bottom:1px solid rgba(255,255,255,.08);font-size:11px;}
  .ptbl td{border-bottom:1px solid rgba(255,255,255,.04);font-size:12.5px;padding:7px 10px;}
  .pempty{color:#6B7C97;font-size:12.5px;padding:4px 2px;}
  .empty{padding:30px;text-align:center;color:#6B7C97;font-size:14px;}
  @media(max-width:640px){ h1{font-size:15px;} th,td{padding:9px 8px;font-size:12.5px;} .daterange{flex:1;} }
</style>
</head>
<body>
<header>
  <div class="top">
    <div style="flex:1;min-width:180px;">
      <h1>Marketing · Đơn & Doanh thu theo nhân viên</h1>
      <p class="sub">Dữ liệu từ hệ thống quản lý đơn hàng (Sandbox)</p>
    </div>
    <div class="daterange">
      <label>Từ</label><input type="date" id="from">
      <span style="color:#5C6E8C;">→</span>
      <label>Đến</label><input type="date" id="to">
    </div>
    <button class="btn" id="refreshBtn">Cập nhật</button>
    <a href="/" class="link">← Dashboard</a>
    <a href="/logout" class="link">Đăng xuất</a>
  </div>
</header>

<main>
  <div class="status" id="status">Đang tải dữ liệu đã lưu…</div>
  <table id="tbl">
    <thead>
      <tr>
        <th>Nhân viên marketing</th>
        <th class="num">Số đơn</th>
        <th class="num">Đơn chốt</th>
        <th class="num">Đơn ship TC</th>
        <th class="num">Số SP</th>
        <th class="num">Doanh thu (VND)</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</main>

<script>
const vnd = n => (Number(n)||0).toLocaleString('vi-VN');
const $ = id => document.getElementById(id);

/* mặc định: từ đầu tháng này đến hôm nay */
(function initDates(){
  const t = new Date(); const fmt = d => d.toISOString().slice(0,10);
  const first = new Date(t.getFullYear(), t.getMonth(), 1);
  $('to').value = fmt(t); $('from').value = fmt(first);
})();

let expanded = new Set();
let lastRows = [];
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderRows(rows){
  lastRows = rows || [];
  const tb = $('rows');
  if(!lastRows.length){ tb.innerHTML = '<tr><td colspan="6" class="empty">Chưa có dữ liệu. Chọn khoảng ngày rồi bấm "Cập nhật".</td></tr>'; return; }
  let tDon=0,tChot=0,tShip=0,tSP=0,tRev=0, html='';
  lastRows.forEach((r,i)=>{
    tDon+=r.soDon||0; tChot+=r.chot||0; tShip+=r.ship||0; tSP+=r.soSP||0; tRev+=r.doanhthu||0;
    const prods = r.products||[];
    const open = expanded.has(r.name);
    html += `<tr class="emp" data-i="${i}">
      <td>${open?'▾':'▸'} ${esc(r.name)} <span class="pcount">(${prods.length} loại)</span></td>
      <td class="num">${vnd(r.soDon)}</td>
      <td class="num">${vnd(r.chot)}</td>
      <td class="num">${vnd(r.ship)}</td>
      <td class="num">${vnd(r.soSP)}</td>
      <td class="num rev">${vnd(r.doanhthu)}</td>
    </tr>`;
    if(open){
      html += '<tr class="detail"><td colspan="6"><div class="prodbox">';
      if(!prods.length){ html += '<div class="pempty">Đơn của nhân viên này chưa có dữ liệu sản phẩm.</div>'; }
      else {
        html += '<table class="ptbl"><thead><tr><th>Tên sản phẩm</th><th class="num">Số đơn</th><th class="num">Số lượng</th></tr></thead><tbody>';
        prods.forEach(p=>{ html += `<tr><td>${esc(p.ten)}</td><td class="num">${vnd(p.soDon)}</td><td class="num">${vnd(p.soLuong)}</td></tr>`; });
        html += '</tbody></table>';
      }
      html += '</div></td></tr>';
    }
  });
  html += `<tr class="total"><td>Tổng cộng</td><td class="num">${vnd(tDon)}</td><td class="num">${vnd(tChot)}</td><td class="num">${vnd(tShip)}</td><td class="num">${vnd(tSP)}</td><td class="num">${vnd(tRev)}</td></tr>`;
  tb.innerHTML = html;
}

// Bấm vào dòng nhân viên để mở/đóng danh sách sản phẩm của họ
$('rows').addEventListener('click', e=>{
  const tr = e.target.closest('tr.emp'); if(!tr) return;
  const r = lastRows[+tr.dataset.i]; if(!r) return;
  if(expanded.has(r.name)) expanded.delete(r.name); else expanded.add(r.name);
  renderRows(lastRows);
});

function setStatus(d){
  const s = $('status');
  if(d.error){ s.innerHTML = '<span class="err">Lỗi: '+d.error+'</span>'; return; }
  if(!d.hasToken){ s.innerHTML = '<span class="warn">Chưa khai SANDBOX_TOKEN trên máy chủ — xem hướng dẫn để thêm token rồi khởi động lại app.</span>'; return; }
  if(d.fetching){
    const tot = d.totalRecord ? ('/'+d.totalRecord) : '';
    s.innerHTML = '<span class="warn">Đang cập nhật ngầm… đã tải '+(d.loaded||0)+tot+' đơn. Bảng sẽ tự điền dần (mỗi trang cách nhau ~60 giây).</span>';
    return;
  }
  if(d.lastUpdated){
    const t = new Date(d.lastUpdated);
    s.textContent = 'Cập nhật lúc: ' + t.toLocaleString('vi-VN') + (d.since? '  ·  khoảng '+d.since+' → '+d.until : '');
  } else {
    s.textContent = 'Chưa có dữ liệu. Chọn khoảng ngày rồi bấm "Cập nhật".';
  }
}

let pollTimer = null;
async function load(){
  try{
    const res = await fetch('/api/marketing');
    if(res.status===401){ location.href='/login'; return; }
    const d = await res.json();
    setStatus(d); renderRows(d.rows);
    $('refreshBtn').disabled = d.fetching || !d.hasToken;
    if(d.fetching && !pollTimer){ pollTimer = setInterval(load, 5000); }
    if(!d.fetching && pollTimer){ clearInterval(pollTimer); pollTimer = null; }
  }catch(e){ $('status').innerHTML = '<span class="err">Không kết nối được máy chủ: '+e.message+'</span>'; }
}

$('refreshBtn').addEventListener('click', async ()=>{
  const since=$('from').value, until=$('to').value;
  if(!since||!until) return;
  $('refreshBtn').disabled = true;
  $('status').innerHTML = '<span class="warn">Đang bắt đầu cập nhật…</span>';
  try{
    const res = await fetch('/api/marketing/refresh',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({since, until})
    });
    if(res.status===401){ location.href='/login'; return; }
    await res.json();
    load();
  }catch(e){ $('status').innerHTML = '<span class="err">Lỗi: '+e.message+'</span>'; $('refreshBtn').disabled=false; }
});

load();
</script>
</body>
</html>
