<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sản phẩm — Check ADS TDMJSC</title>
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0B1322;color:#E7EEF8;}
  header{background:#10192B;border-bottom:1px solid rgba(255,255,255,.07);padding:14px 18px;}
  .top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  h1{font-size:17px;margin:0;}
  .sub{color:#9FB0C8;font-size:12px;margin:2px 0 0;font-weight:400;}
  .ctrl{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);padding:7px 11px;border-radius:9px;}
  .ctrl label{font-size:11px;color:#9FB0C8;}
  .ctrl input[type=date]{font-family:'Inter';font-size:12.5px;color:#fff;background:transparent;border:none;outline:none;color-scheme:dark;}
  select.pick,input.search{font-family:'Inter';font-size:12.5px;color:#fff;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);padding:8px 11px;border-radius:9px;outline:none;}
  select.pick{cursor:pointer;color-scheme:dark;}
  .search{min-width:170px;}
  .quick{display:flex;gap:6px;}
  .quick button{font-family:'Inter';font-size:11.5px;color:#C4D0E2;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);padding:6px 9px;border-radius:8px;cursor:pointer;}
  .quick button:hover{background:rgba(255,255,255,.12);color:#fff;}
  .btn{font-family:'Inter';font-size:13px;font-weight:600;color:#fff;background:#3D5AFE;border:none;padding:8px 16px;border-radius:9px;cursor:pointer;white-space:nowrap;}
  .btn:hover{background:#2f49d6;} .btn:disabled{opacity:.5;cursor:not-allowed;}
  .link{color:#C4D0E2;font-size:13px;text-decoration:none;border:1px solid rgba(255,255,255,.14);padding:7px 12px;border-radius:9px;white-space:nowrap;}
  .link:hover{background:rgba(255,255,255,.08);color:#fff;}
  main{padding:18px;max-width:1000px;margin:0 auto;}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .chk{display:flex;align-items:center;gap:6px;font-size:12.5px;color:#C4D0E2;}
  .status{font-size:13px;color:#9FB0C8;margin:4px 0 16px;min-height:18px;}
  .status .warn{color:#ffc56b;} .status .err{color:#ff9b8a;}
  table{width:100%;border-collapse:collapse;background:#101B2E;border-radius:12px;overflow:hidden;}
  th,td{padding:12px 14px;text-align:left;font-size:13.5px;border-bottom:1px solid rgba(255,255,255,.05);}
  th{background:#16233A;color:#9FB0C8;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;}
  tr:last-child td{border-bottom:none;}
  tr.total td{background:#16233A;font-weight:700;color:#fff;}
  .chip{display:inline-block;padding:2px 9px;border-radius:20px;background:rgba(61,90,254,.15);color:#9DB2FF;font-size:12px;}
  .chip.none{background:rgba(255,255,255,.06);color:#7C8CA6;}
  .ok{color:#7BE3B5;font-weight:600;}
  .muted{color:#6B7C97;}
  .empty{padding:30px;text-align:center;color:#6B7C97;font-size:14px;}
  @media(max-width:680px){ h1{font-size:15px;} th,td{padding:9px 8px;font-size:12px;} .ctrl{flex:1 1 100%;} .search{flex:1;} }
</style>
</head>
<body>
<header>
  <div class="top">
    <div style="flex:1;min-width:170px;">
      <h1>Sản phẩm · Kết quả theo nhân viên tìm SP</h1>
      <p class="sub">Số contact &amp; đơn chốt theo NGÀY TẠO · người quản lý đồng bộ từ Google Sheet</p>
    </div>
    <div class="quick">
      <button data-range="today">Hôm nay</button>
      <button data-range="yesterday">Hôm qua</button>
      <button data-range="month">Tháng này</button>
    </div>
    <div class="ctrl">
      <label>Từ</label><input type="date" id="from">
      <span style="color:#5C6E8C;">→</span>
      <label>Đến</label><input type="date" id="to">
    </div>
    <button class="btn" id="refreshBtn">Xem</button>
    <a href="/" class="link">← Dashboard</a>
    <a href="/marketing.html" class="link">Marketing</a>
    <a href="/logout" class="link">Đăng xuất</a>
  </div>
</header>

<main>
  <div class="toolbar">
    <select class="pick" id="mgr"><option value="all">Mọi nhân viên</option></select>
    <input class="search" id="search" placeholder="Tìm tên sản phẩm…">
    <select class="pick" id="sort">
      <option value="contact_desc">Contact: cao → thấp</option>
      <option value="contact_asc">Contact: thấp → cao</option>
      <option value="chot_desc">Đơn chốt: cao → thấp</option>
      <option value="chot_asc">Đơn chốt: thấp → cao</option>
      <option value="name_asc">Tên A → Z</option>
    </select>
    <label class="chk"><input type="checkbox" id="hidezero" checked> Ẩn contact = 0</label>
  </div>
  <div class="status" id="status">Đang tải…</div>
  <table id="tbl">
    <thead>
      <tr>
        <th data-sort="name_asc">Tên sản phẩm</th>
        <th>Người quản lý</th>
        <th class="num" data-sort="contact_desc">Số contact</th>
        <th class="num" data-sort="chot_desc">Số đơn chốt</th>
        <th class="num">Tỷ lệ chốt</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</main>

<script>
const vnd=n=>(Number(n)||0).toLocaleString('vi-VN');
const $=id=>document.getElementById(id);
const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct=(c,t)=>t?Math.round(c/t*1000)/10+'%':'–';
let DATA={rows:[],managers:[]};
let st={mgr:'all',q:'',sort:'contact_desc',hidezero:true};

function setRange(kind){
  const t=new Date();
  if(kind==='today'){$('from').value=fmt(t);$('to').value=fmt(t);}
  else if(kind==='yesterday'){const y=new Date(t);y.setDate(t.getDate()-1);$('from').value=fmt(y);$('to').value=fmt(y);}
  else {$('from').value=fmt(new Date(t.getFullYear(),t.getMonth(),1));$('to').value=fmt(t);}
}
setRange('month');

function buildMgr(){
  const set=new Set(DATA.managers||[]);
  let hasNone=false;
  (DATA.rows||[]).forEach(r=>{ if(r.manager) set.add(r.manager); else hasNone=true; });
  const opts=['<option value="all">Mọi nhân viên</option>']
    .concat([...set].sort().map(m=>`<option value="${esc(m)}">${esc(m)}</option>`));
  if(hasNone) opts.push('<option value="__none__">(chưa gán)</option>');
  const cur=st.mgr; $('mgr').innerHTML=opts.join('');
  if([...$('mgr').options].some(o=>o.value===cur)) $('mgr').value=cur; else st.mgr='all';
}

function render(){
  const tb=$('rows');
  let rows=(DATA.rows||[]).slice();
  if(st.mgr==='__none__') rows=rows.filter(r=>!r.manager);
  else if(st.mgr!=='all') rows=rows.filter(r=>r.manager===st.mgr);
  if(st.q) rows=rows.filter(r=>(r.product||'').toLowerCase().includes(st.q));
  if(st.hidezero) rows=rows.filter(r=>(r.contact||0)>0);
  const dir=st.sort.endsWith('asc')?1:-1;
  if(st.sort.startsWith('name')) rows.sort((a,b)=>(a.product||'').localeCompare(b.product||'','vi')*dir);
  else if(st.sort.startsWith('chot')) rows.sort((a,b)=>((a.chot||0)-(b.chot||0))*dir);
  else rows.sort((a,b)=>((a.contact||0)-(b.contact||0))*dir);
  if(!rows.length){ tb.innerHTML='<tr><td colspan="5" class="empty">Không có sản phẩm phù hợp.</td></tr>'; return; }
  let C=0,K=0;
  let html=rows.map(r=>{ C+=r.contact||0; K+=r.chot||0;
    return `<tr>
      <td>${esc(r.product)||'<span class="muted">(không tên)</span>'}</td>
      <td>${r.manager?`<span class="chip">${esc(r.manager)}</span>`:'<span class="chip none">chưa gán</span>'}</td>
      <td class="num">${vnd(r.contact)}</td>
      <td class="num ok">${vnd(r.chot)}</td>
      <td class="num">${pct(r.chot,r.contact)}</td>
    </tr>`; }).join('');
  html+=`<tr class="total"><td>Tổng (${rows.length} SP)</td><td></td><td class="num">${vnd(C)}</td><td class="num">${vnd(K)}</td><td class="num">${pct(K,C)}</td></tr>`;
  tb.innerHTML=html;
}

async function load(){
  const since=$('from').value, until=$('to').value;
  if(!since||!until) return;
  $('refreshBtn').disabled=true;
  $('status').innerHTML='<span class="warn">Đang tải báo cáo sản phẩm…</span>';
  try{
    const res=await fetch('/api/products/report?since='+since+'&until='+until);
    if(res.status===401){ location.href='/login'; return; }
    const d=await res.json();
    if(!d.ok){ $('status').innerHTML='<span class="err">Lỗi: '+esc(d.message||'không lấy được báo cáo')+'</span>'; $('rows').innerHTML=''; }
    else{
      DATA=d; buildMgr(); render();
      const t=new Date(d.lastUpdated||Date.now());
      const same=since===until;
      let note='Cập nhật '+t.toLocaleString('vi-VN')+'  ·  '+(same?('ngày '+since):(since+' → '+until));
      if(!d.ownersCount) note+='  ·  ⚠ chưa đọc được Google Sheet (kiểm tra SHEET_CSV_URL)';
      else note+='  ·  '+d.ownersCount+' SP có người quản lý';
      $('status').textContent=note;
    }
  }catch(e){ $('status').innerHTML='<span class="err">Không kết nối được máy chủ: '+esc(e.message)+'</span>'; }
  finally{ $('refreshBtn').disabled=false; }
}

document.querySelectorAll('.quick button').forEach(b=>b.addEventListener('click',()=>{setRange(b.dataset.range);load();}));
$('refreshBtn').addEventListener('click',load);
$('mgr').addEventListener('change',e=>{st.mgr=e.target.value;render();});
$('search').addEventListener('input',e=>{st.q=e.target.value.toLowerCase();render();});
$('sort').addEventListener('change',e=>{st.sort=e.target.value;render();});
$('hidezero').addEventListener('change',e=>{st.hidezero=e.target.checked;render();});
document.querySelectorAll('th[data-sort]').forEach(th=>th.addEventListener('click',()=>{st.sort=th.dataset.sort;$('sort').value=st.sort;render();}));

load();
</script>
</body>
</html>
