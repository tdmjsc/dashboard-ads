name: Auto Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.202.138.149
          port: 65002
          username: u422036594
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            PROJECT=/home/u422036594/domains/ads.tdmjsc.com/nodejs
            DATA=/home/u422036594/data

            # Đảm bảo thư mục data tồn tại (nằm NGOÀI project, không bao giờ bị ghi đè)
            mkdir -p "$DATA"
            [ -f "$DATA/salary-manual.json" ] || echo '{}' > "$DATA/salary-manual.json"

            cd "$PROJECT"

            # Pull code mới từ GitHub
            git checkout main
            git pull origin main

            # Tạo lại symlink trỏ vào file dữ liệu thật ở ~/data
            # (xóa file/symlink cũ trong project rồi link lại)
            rm -f "$PROJECT/salary-manual.json"
            ln -sf "$DATA/salary-manual.json" "$PROJECT/salary-manual.json"

            # Restart Node.js
            touch tmp/restart.txt

            echo "Deploy thanh cong luc $(date)"
            echo "Symlink salary-manual.json:"
            ls -la "$PROJECT/salary-manual.json"
